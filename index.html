            alert("Aaj ka Free Fire Redeem Code hai: FF9M-2GF1-NU71 🎁");

        <!-- Fixed Right-Side Visitor Counter (FIXED CODE) -->
<div style="position: fixed; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.85); padding: 10px 15px; border-radius: 8px; border: 2px solid #ff4500; box-shadow: 0 0 10px #ff4500; z-index: 9999; text-align: center; color: #fff; font-family: Arial, sans-serif; font-weight: bold; font-size: 14px;">

  <!-- Main Counter Number -->
  <span id="visitor_counter_num" style="color: #ff4500; font-size: 20px;">000000</span>
</div>
<!-- SCRIPT FOR THE COUNTER (UPDATED & FAST) -->
<script type="text/javascript">
  var counter_url = "https://hits.securicons.xyz/hc/abdullahbahi3272-gif/freefire-gaming";
  fetch(counter_url)
    .then(response => response.json())
    .then(data => {
      // Yeh line ginti ko 6 digits mein dikhaye gi (jaise 000005)
      var formattedCount = String(data.hits).padStart(6, '0');
      document.getElementById('visitor_counter_num').textContent = formattedCount;
    })
    .catch(err => {
      console.log("Counter error: ", err);
    });
</script>
